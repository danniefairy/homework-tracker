
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyVault // Homework Problem Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --border-color: #e2e8f0;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --accent-primary: #4f46e5;
            --accent-primary-hover: #4338ca;
            --accent-ai: #eab308;
            --danger-color: #ef4444;
            --sidebar-width: 260px;
        }

        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-main);
            color: var(--text-primary);
            padding: 20px;
        }

        .dashboard {
            width: 100%;
            max-width: 1100px;
            height: 650px;
            background-color: var(--bg-card);
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
            display: flex;
            overflow: hidden;
        }

        .sidebar {
            width: var(--sidebar-width);
            border-right: 1px solid var(--border-color);
            background-color: #fafafa;
            display: flex;
            flex-direction: column;
            padding: 20px 16px;
        }

        .sidebar-header {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: 12px;
            padding-left: 4px;
        }

        .search-container {
            position: relative;
            margin-bottom: 16px;
        }

        .search-bar {
            width: 100%;
            padding: 10px 12px;
            font-size: 14px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-card);
            outline: none;
            transition: all 0.2s ease;
        }

        .search-bar:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .question-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 2px;
        }

        .question-list::-webkit-scrollbar {
            width: 4px;
        }
        .question-list::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        .question-tab {
            display: flex;
            flex-direction: column;
            padding: 12px;
            border-radius: 8px;
            background-color: transparent;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid transparent;
            position: relative;
        }

        .question-tab:hover {
            background-color: #f1f5f9;
        }

        .question-tab.active {
            background-color: #eef2ff;
            border-color: #c7d2fe;
        }

        .tab-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2px;
        }

        .tab-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .question-tab.active .tab-title {
            color: var(--accent-primary);
        }

        .tab-preview {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-right: 20px;
            margin-bottom: 6px;
        }

        .tag-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tag-badge {
            display: inline-block;
            font-size: 11px;
            line-height: 1;
            padding: 5px 8px;
            border-radius: 999px;
            background-color: #e0e7ff;
            color: #4338ca;
            border: 1px solid #c7d2fe;
        }

        /* Sleek Delete Button Inside Sidebar Row */
        .delete-tab-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 18px;
            line-height: 1;
            cursor: pointer;
            padding: 0 4px;
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        .delete-tab-btn:hover {
            color: var(--danger-color);
            background-color: #fee2e2;
        }

        .workspace {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            padding: 24px;
            gap: 20px;
            background-color: var(--bg-card);
        }

        .card-pane {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .pane-label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .pane-label .badge {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
        }
        .bg-indigo { background-color: var(--accent-primary); }
        .bg-amber { background-color: var(--accent-ai); }
        .bg-green { background-color: #22c55e; }

        .textarea-input,
        .tag-input {
            width: 100%;
            padding: 16px;
            font-size: 15px;
            line-height: 1.5;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background-color: #fafafa;
            outline: none;
            color: var(--text-primary);
            transition: all 0.2s ease;
        }

        .textarea-input {
            flex-grow: 1;
            resize: none;
        }

        .tag-input {
            padding: 12px 16px;
        }

        .textarea-input:focus,
        .tag-input:focus {
            background-color: var(--bg-card);
            border-color: var(--accent-primary);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.03);
        }

        .textarea-ai {
            width: 100%;
            flex-grow: 1;
            padding: 16px;
            font-size: 15px;
            line-height: 1.5;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background-color: #fefcf6;
            resize: none;
            outline: none;
            color: var(--text-secondary);
            cursor: not-allowed;
        }

        .action-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-top: -4px;
        }

        .submit-btn {
            background-color: var(--accent-primary);
            color: white;
            border: none;
            padding: 10px 24px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2);
            transition: all 0.2s ease;
        }

        .submit-btn:hover {
            background-color: var(--accent-primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 12px -1px rgba(79, 70, 229, 0.25);
        }

        .submit-btn:active {
            transform: translateY(0);
        }
        
        .empty-state {
            text-align: center;
            color: var(--text-secondary);
            font-size: 13px;
            margin-top: 30px;
            padding: 0 10px;
        }

        .helper-text {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 6px;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="sidebar">
            <div class="sidebar-header">History Vault</div>
            <div class="search-container">
                <input type="text" id="searchBar" class="search-bar" placeholder="Filter questions or tags...">
            </div>
            <div id="questionList" class="question-list"></div>
        </div>

        <div class="workspace">
            <div class="card-pane">
                <label class="pane-label">
                    <span class="badge bg-indigo"></span> Target Homework Problem
                </label>
                <textarea id="questionInput" class="textarea-input" placeholder="Paste or type your problem scenario or formula here..."></textarea>
            </div>

            <div class="card-pane" style="flex: 0.45;">
                <label class="pane-label">
                    <span class="badge bg-green"></span> Tags
                </label>
                <input
                    type="text"
                    id="tagInput"
                    class="tag-input"
                    placeholder="Add tags separated by commas, like algebra, chapter 3, hard"
                >
                <div class="helper-text">Tags will be saved with the question and shown in the sidebar.</div>
            </div>

            <div class="card-pane">
                <label class="pane-label">
                    <span class="badge bg-amber"></span> Similar AI Variations (Next Phase)
                </label>
                <textarea id="aiOutput" class="textarea-ai" placeholder="Variations generated by an LLM backend will stream here in the future..." readonly></textarea>
            </div>

            <div class="action-bar">
                <button id="submitBtn" class="submit-btn">Save to Repository</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://fzlbmrylnfeaswgeheic.supabase.co";
        const SUPABASE_KEY = "sb_publishable_JVwk5bJExnYt0Y9Ey0hlkQ_erC535r3";
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const questionInput = document.getElementById('questionInput');
        const tagInput = document.getElementById('tagInput');
        const aiOutput = document.getElementById('aiOutput');
        const submitBtn = document.getElementById('submitBtn');
        const questionList = document.getElementById('questionList');
        const searchBar = document.getElementById('searchBar');

        let currentSearchQuery = "";

        function normalizeTags(tagString) {
            if (!tagString) return [];
            return tagString
                .split(',')
                .map(tag => tag.trim())
                .filter(tag => tag.length > 0);
        }

        function formatTagsForDisplay(tagString) {
            const tags = normalizeTags(tagString);
            return tags;
        }

        // Read data from cloud
        async function fetchQuestions() {
            let query = supabaseClient.from('problems').select('*').order('id', { ascending: false });

            if (currentSearchQuery) {
                query = query.or(`text.ilike.%${currentSearchQuery}%,tags.ilike.%${currentSearchQuery}%`);
            }

            const { data, error } = await query;
            if (error) {
                console.error("Error reading database:", error);
                return;
            }
            
            renderSidebar(data || []);
        }

        function renderSidebar(questions) {
            questionList.innerHTML = "";
            
            if (questions.length === 0) {
                questionList.innerHTML = `<div class="empty-state">No matching problems found.</div>`;
                return;
            }

            questions.forEach((q) => {
                const tab = document.createElement('div');
                tab.className = 'question-tab';
                const cleanPreview = (q.text || "").replace(/\s+/g, ' ');
                const tags = formatTagsForDisplay(q.tags);

                tab.innerHTML = `
                    <div class="tab-header-row">
                        <div class="tab-title">Problem #${q.id}</div>
                        <button class="delete-tab-btn" title="Delete Problem">&times;</button>
                    </div>
                    <div class="tab-preview">${cleanPreview || "Empty description"}</div>
                    <div class="tag-row">
                        ${tags.length ? tags.map(tag => `<span class="tag-badge">${tag}</span>`).join('') : `<span class="tag-badge" style="background:#f1f5f9;color:#64748b;border-color:#e2e8f0;">No tags</span>`}
                    </div>
                `;

                // Main tab click event to view problem text
                tab.addEventListener('click', (e) => {
                    if (e.target.classList.contains('delete-tab-btn')) return;

                    document.querySelectorAll('.question-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    questionInput.value = q.text || "";
                    tagInput.value = q.tags || "";
                    aiOutput.value = ""; 
                });

                // Delete button targeting inside the tab
                const deleteBtn = tab.querySelector('.delete-tab-btn');
                deleteBtn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    
                    if (confirm(`Are you sure you want to delete Problem #${q.id}?`)) {
                        const { error } = await supabaseClient
                            .from('problems')
                            .delete()
                            .eq('id', q.id);

                        if (error) {
                            alert("Delete Failed: " + error.message);
                            console.error(error);
                        } else {
                            if (questionInput.value === (q.text || "")) {
                                questionInput.value = "";
                                tagInput.value = "";
                            }
                            fetchQuestions();
                        }
                    }
                });

                questionList.appendChild(tab);
            });
        }

        // Write data to cloud
        submitBtn.addEventListener('click', async () => {
            const text = questionInput.value.trim();
            const tags = normalizeTags(tagInput.value).join(', ');

            if (!text) return;

            const { error } = await supabaseClient
                .from('problems')
                .insert([{ text: text, tags: tags }]);

            if (error) {
                alert("Database Error: " + error.message);
                console.error(error);
            } else {
                questionInput.value = "";
                tagInput.value = "";
                fetchQuestions();
            }
        });

        searchBar.addEventListener('input', (e) => {
            currentSearchQuery = e.target.value.trim();
            fetchQuestions();
        });

        fetchQuestions();
    </script>
</body>
</html>
